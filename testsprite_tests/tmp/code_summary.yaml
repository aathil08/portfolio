version: "2"
type: frontend
tech_stack:
  - JavaScript
  - React 19
  - Vite 8
  - Tailwind CSS 3
  - Framer Motion
  - EmailJS
  - React Icons
routes:
  - path: /
    file: src/App.jsx
    auth_required: false
    description: Single-page portfolio application with all sections on one scrollable page
features:
  - name: Loader / Splash Screen
    description: Animated loading screen that plays on initial page load before revealing the portfolio
    files:
      - src/components/ui/Loader.jsx
      - src/App.jsx
    entry_route: /
    user_interactions:
      - Wait for loader animation to complete
      - Loader exits and portfolio content becomes visible
    api_calls: []
    auth_required: false

  - name: Theme Toggle (Dark/Light Mode)
    description: Toggle between dark and light mode via a navbar button, persisted in context
    files:
      - src/context/ThemeContext.jsx
      - src/components/layout/Navbar.jsx
    entry_route: /
    user_interactions:
      - Click theme toggle button in the navbar
      - Page switches between dark and light mode
    api_calls: []
    auth_required: false

  - name: Navbar Navigation
    description: Sticky top navigation bar with links to all portfolio sections and theme toggle
    files:
      - src/components/layout/Navbar.jsx
      - src/data/index.js
    entry_route: /
    user_interactions:
      - Click nav link to scroll to corresponding section (About, Skills, Experience, Projects, Education, Certifications, Resume, Contact)
      - Observe active section highlighted in navbar
      - Click hamburger menu on mobile
    api_calls: []
    auth_required: false

  - name: Hero Section
    description: Full-screen landing section with name, animated roles, tagline, CTA buttons, and social links
    files:
      - src/components/sections/Hero.jsx
      - src/data/index.js
    entry_route: /
    user_interactions:
      - View animated role text cycling through Full Stack Developer, Java Developer, Software Developer
      - Click View My Work button to scroll to Projects section
      - Click Contact Me button to scroll to Contact section
      - Click GitHub or LinkedIn social link
      - Click Download Resume button
    api_calls: []
    auth_required: false

  - name: About Section
    description: Personal bio, stats counters (years experience, projects, technologies, certifications), and profile highlights
    files:
      - src/components/sections/About.jsx
      - src/data/index.js
    entry_route: /#about
    user_interactions:
      - Scroll to About section to trigger animations
      - View animated stat counters
      - Read bio text
    api_calls: []
    auth_required: false

  - name: Skills Section
    description: Filterable skills display organized by category tabs (Programming, Frontend, Backend, Database, Tools)
    files:
      - src/components/sections/Skills.jsx
      - src/data/index.js
    entry_route: /#skills
    user_interactions:
      - Click category tab to filter skills (Programming, Frontend, Backend, Database, Tools)
      - View skill icons with hover animations
    api_calls: []
    auth_required: false

  - name: Experience Section
    description: Professional experience timeline showing internship at VDart with role, period, description and tech stack
    files:
      - src/components/sections/Experience.jsx
      - src/data/index.js
    entry_route: /#experience
    user_interactions:
      - Scroll to Experience section to trigger entrance animations
      - View experience card with role, company, duration, and tech stack
    api_calls: []
    auth_required: false

  - name: Projects Section
    description: Filterable project cards grid with category filtering, GitHub links, and feature lists
    files:
      - src/components/sections/Projects.jsx
      - src/data/index.js
    entry_route: /#projects
    user_interactions:
      - Click filter button to filter projects by category (All, Full Stack)
      - View project card with title, description, tech stack
      - Click GitHub button on a project card to open GitHub profile
      - Click View Live button (disabled if no live URL)
    api_calls: []
    auth_required: false

  - name: Education Section
    description: Education timeline showing B.E. Computer Science Engineering degree details
    files:
      - src/components/sections/Education.jsx
      - src/data/index.js
    entry_route: /#education
    user_interactions:
      - Scroll to Education section to trigger animations
      - View degree, institution, period, grade, and courses
    api_calls: []
    auth_required: false

  - name: Certifications Section
    description: Grid of certification cards with issuer, date, and verify links
    files:
      - src/components/sections/Certifications.jsx
      - src/data/index.js
    entry_route: /#certifications
    user_interactions:
      - Scroll to Certifications section to trigger card animations
      - View certification title, issuer, and date
      - Click Verify button on certification card
    api_calls: []
    auth_required: false

  - name: Resume Section
    description: Resume download section with embedded resume viewer/download button
    files:
      - src/components/sections/Resume.jsx
      - src/data/index.js
    entry_route: /#resume
    user_interactions:
      - Scroll to Resume section
      - Click Download Resume button to download PDF
      - View resume preview
    api_calls: []
    auth_required: false

  - name: Contact Form
    description: Contact section with email/location info, social links, and a form that sends messages via EmailJS
    files:
      - src/components/sections/Contact.jsx
      - src/data/index.js
    entry_route: /#contact
    user_interactions:
      - Fill in Name field
      - Fill in Email Address field
      - Fill in Subject field
      - Fill in Message field
      - Click Send Message button to submit form
      - See success or error toast notification after submission
      - Click email link to open mail client
      - Click GitHub social icon
      - Click LinkedIn social icon
    api_calls:
      - method: POST
        endpoint: https://api.emailjs.com/api/v1.0/email/send-form
    auth_required: false

  - name: Scroll Progress Bar
    description: Thin progress bar at top of page indicating scroll position
    files:
      - src/components/layout/ScrollProgress.jsx
    entry_route: /
    user_interactions:
      - Scroll page to see progress bar fill
    api_calls: []
    auth_required: false

  - name: Side Links
    description: Fixed social and email links on the side of the viewport
    files:
      - src/components/layout/SideLinks.jsx
      - src/data/index.js
    entry_route: /
    user_interactions:
      - Click GitHub side link
      - Click LinkedIn side link
      - Click email side link
    api_calls: []
    auth_required: false

  - name: Footer
    description: Page footer with copyright info and back-to-top functionality
    files:
      - src/components/layout/Footer.jsx
      - src/data/index.js
    entry_route: /
    user_interactions:
      - View footer with name and copyright
      - Click back to top link
    api_calls: []
    auth_required: false

known_limitations:
  - issue: Contact form uses placeholder EmailJS credentials (YOUR_SERVICE_ID, YOUR_TEMPLATE_ID, YOUR_PUBLIC_KEY) so email submission will fail
    location: src/components/sections/Contact.jsx
    impact: Form submission will always throw an error in the current state; tests should verify form UI interactions, validation and toast notifications
  - issue: Resume PDF is served from /resume.pdf in public folder — download may return 404 if PDF is missing
    location: public/resume.pdf
    impact: Download resume button may fail to download actual file
  - issue: Verify buttons on certification cards link to # (placeholder URLs)
    location: src/components/sections/Certifications.jsx
    impact: Verify links do not navigate to real credential pages
